<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0; padding:20px; background:#f5f5f5; font-family:'Malgun Gothic','맑은 고딕',sans-serif;">
<div style="max-width:600px; margin:0 auto; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1);">

  <!-- 헤더 -->
  <div style="background:#FF6B35; color:#fff; padding:20px 30px;">
    <h1 style="margin:0; font-size:20px;">광고비 알림</h1>
    <p style="margin:5px 0 0; font-size:14px; opacity:0.9;">일일 광고비가 기준 이하로 떨어졌습니다</p>
  </div>

  <!-- 본문 -->
  <div style="padding:30px;">
    <table style="width:100%; border-collapse:collapse;">
      <tr>
        <td style="padding:15px 20px; background:#fff3ed; border-radius:6px; text-align:center;">
          <div style="font-size:13px; color:#888; margin-bottom:8px;">계정</div>
          <div style="font-size:18px; font-weight:bold; color:#333;">{{ account_name }}</div>
        </td>
      </tr>
    </table>

    <div style="margin-top:20px; padding:20px; background:#f8f9fa; border-radius:6px;">
      <table style="width:100%; border-collapse:collapse;">
        <tr>
          <td style="width:50%; text-align:center; padding:10px;">
            <div style="font-size:12px; color:#888; margin-bottom:6px;">오늘 소진액</div>
            <div style="font-size:28px; font-weight:bold; color:#FF6B35;">{{ "{:,.0f}".format(daily_cost) }}원</div>
          </td>
          <td style="width:50%; text-align:center; padding:10px;">
            <div style="font-size:12px; color:#888; margin-bottom:6px;">알림 기준</div>
            <div style="font-size:28px; font-weight:bold; color:#333;">{{ "{:,.0f}".format(threshold) }}원</div>
          </td>
        </tr>
      </table>
    </div>

    <p style="margin-top:20px; font-size:13px; color:#666; line-height:1.6;">
      광고비 소진이 기준 금액보다 적습니다. 광고 노출 상태, 예산 설정, 키워드 입찰가 등을 확인해 주세요.
    </p>
  </div>

  <!-- 푸터 -->
  <div style="padding:15px 30px; background:#f8f9fa; font-size:11px; color:#999; text-align:center;">
    이 알림은 네이버 검색광고 API에서 자동으로 생성되었습니다.
  </div>

</div>
</body>
</html>
